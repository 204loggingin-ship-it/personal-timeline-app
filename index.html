<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fefffc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="个人应用" />
    <title>个人应用</title>
    <link rel="manifest" href="./manifest.webmanifest?v=16" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />
    <link rel="stylesheet" href="./styles.css?v=16" />
    <script src="./app.js?v=16" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="main-content">
        <section class="page" id="daily-page" data-page="daily" hidden>
          <div class="daily-now">
            <h1>现在是：</h1>
            <time id="daily-date" datetime="">正在读取日期</time>
          </div>

          <form class="daily-form" id="daily-form">
            <label class="daily-field" for="sleep-time">
              <span class="daily-field-copy">
                <strong>昨天入睡时间</strong>
              </span>
              <input id="sleep-time" name="sleepTime" type="time" />
            </label>

            <label class="daily-field" for="wake-time">
              <span class="daily-field-copy">
                <strong>今天起床时间</strong>
              </span>
              <input id="wake-time" name="wakeTime" type="time" />
            </label>

            <label class="daily-field" for="steps">
              <span class="daily-field-copy">
                <strong>昨日步数</strong>
              </span>
              <span class="steps-control">
                <input id="steps" name="steps" type="number" min="0" max="200000" inputmode="numeric" />
                <span>步</span>
              </span>
            </label>

            <div class="daily-field period-field" role="group" aria-labelledby="period-label">
              <span class="daily-field-copy" id="period-label">
                <strong>今天是否月经</strong>
              </span>
              <div class="segmented-control">
                <label>
                  <input type="radio" name="period" value="yes" />
                  <span>是</span>
                </label>
                <label>
                  <input type="radio" name="period" value="no" />
                  <span>否</span>
                </label>
              </div>
            </div>

            <button class="daily-save-button" type="submit">保存</button>
          </form>

          <p class="save-status" id="daily-save-status" role="status" aria-live="polite"></p>
        </section>

        <section class="page" id="realtime-page" data-page="realtime">
          <div class="page-heading">
            <h1>实时</h1>
          </div>

          <form class="capture-form" id="capture-form">
            <label class="sr-only" for="capture-input">记录内容</label>
            <textarea
              id="capture-input"
              name="content"
              rows="4"
              maxlength="1000"
              placeholder="写下此刻发生的事……"
              required
            ></textarea>
            <div class="capture-actions">
              <button class="send-button" type="submit" aria-label="发送记录">
                <span>发送</span>
                <span aria-hidden="true">↑</span>
              </button>
            </div>
          </form>

          <p class="save-status" id="save-status" role="status" aria-live="polite"></p>
        </section>

        <section class="page" id="timeline-page" data-page="timeline" hidden>
          <section class="calendar-card" aria-label="日期选择">
            <div class="calendar-header">
              <button class="calendar-nav" id="previous-month" type="button" aria-label="上一个月">‹</button>
              <h2 class="calendar-title" id="calendar-title">正在读取月份</h2>
              <button class="calendar-nav" id="next-month" type="button" aria-label="下一个月">›</button>
            </div>

            <div class="calendar-weekdays" aria-hidden="true">
              <span>一</span>
              <span>二</span>
              <span>三</span>
              <span>四</span>
              <span>五</span>
              <span>六</span>
              <span>日</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
          </section>

          <div class="timeline-carousel" id="timeline-carousel">
            <div class="timeline-view-track" id="timeline-view-track">
              <section class="timeline-view-panel" id="timeline-view" aria-label="所选日期的时间线">
                <div class="page-heading timeline-heading">
                  <p class="timeline-date-label" id="timeline-date">今天</p>
                  <div class="timeline-heading-actions">
                    <p class="record-count" id="record-count">0 条</p>
                    <button class="add-event-button" id="add-event-button" type="button" aria-label="添加记录">＋</button>
                  </div>
                </div>

                <button class="timeline-view-switch note-view-button sr-only" id="show-note-button" type="button">
                  <span>打开当日备注</span>
                  <span aria-hidden="true">›</span>
                </button>

                <ol class="timeline" id="timeline-list"></ol>

                <div class="empty-card" id="timeline-empty">
                  <p class="empty-title">今天还没有记录</p>
                  <p>去“实时”页面写下第一件正在发生的事。</p>
                </div>
              </section>

              <section class="timeline-view-panel note-view-panel" id="note-view" aria-labelledby="note-date-label" aria-hidden="true">
                <div class="note-page-heading">
                  <time id="note-date-label" datetime="">正在读取日期</time>
                  <button class="timeline-view-switch timeline-return-button" id="show-timeline-button" type="button">
                    <span aria-hidden="true">‹</span>
                    <span>返回</span>
                  </button>
                </div>

                <section class="daily-note-card">
                  <label class="sr-only" for="daily-note-input">当日备注内容</label>
                  <textarea
                    id="daily-note-input"
                    rows="6"
                    maxlength="20000"
                    placeholder="可以写下无法放进某个具体时间点的事情……"
                  ></textarea>
                  <button class="clear-note-button" id="clear-note-button" type="button" hidden>清空</button>

                  <div class="note-images-heading">
                    <div>
                      <strong>图片备注</strong>
                      <small>最多 6 张</small>
                    </div>
                    <button class="add-image-button" id="add-image-button" type="button" aria-label="添加图片备注">＋</button>
                    <input id="note-image-input" type="file" accept="image/*" multiple hidden />
                  </div>
                  <div class="note-image-grid" id="note-image-grid"></div>
                  <p class="note-save-status" id="note-save-status" role="status" aria-live="polite"></p>
                </section>
              </section>
            </div>
          </div>
          <button class="data-button timeline-data-button" id="data-button" type="button" aria-label="导出数据">↓</button>
        </section>
      </main>

      <nav class="tab-bar" aria-label="主要页面">
        <button class="tab-button" type="button" data-target="daily" aria-selected="false">
          <span class="tab-icon" aria-hidden="true">□</span>
          <span>每日</span>
        </button>
        <button class="tab-button is-active" type="button" data-target="realtime" aria-selected="true">
          <span class="tab-icon tab-icon-live" aria-hidden="true"></span>
          <span>实时</span>
        </button>
        <button class="tab-button" type="button" data-target="timeline" aria-selected="false">
          <span class="tab-icon" aria-hidden="true">≡</span>
          <span>时间轴</span>
        </button>
      </nav>
    </div>

    <dialog class="event-dialog" id="event-dialog" aria-labelledby="event-dialog-title">
      <form class="event-form" id="event-form">
        <div class="dialog-heading">
          <div>
            <p class="section-kicker" id="event-dialog-date">所选日期</p>
            <h2 id="event-dialog-title">添加记录</h2>
          </div>
          <button class="dialog-close" id="event-dialog-close" type="button" aria-label="关闭">×</button>
        </div>

        <div id="editable-event-fields">
          <label class="event-field" for="event-time">
            <span>时间</span>
            <input id="event-time" name="time" type="time" required />
          </label>

          <label class="event-field event-content-field" for="event-content">
            <span>内容</span>
            <textarea id="event-content" name="content" rows="5" maxlength="1000" required></textarea>
          </label>
        </div>

        <div class="locked-event-message" id="locked-event-message" hidden>
          <p>这条记录由“每日”页面生成。请回到“每日”修改，以免固定数据出现冲突。</p>
        </div>

        <p class="dialog-status" id="dialog-status" role="status" aria-live="polite"></p>

        <div class="dialog-actions">
          <button class="delete-event-button" id="delete-event-button" type="button" hidden>删除记录</button>
          <button class="secondary-button" id="go-daily-button" type="button" hidden>去每日修改</button>
          <button class="primary-button" id="save-event-button" type="submit">保存记录</button>
        </div>
      </form>
    </dialog>

    <dialog class="data-dialog" id="data-dialog" aria-labelledby="data-dialog-title">
      <section class="data-panel">
        <div class="dialog-heading">
          <div>
            <p class="section-kicker">只在这台设备上处理</p>
            <h2 id="data-dialog-title">数据与备份</h2>
          </div>
          <button class="dialog-close" id="data-dialog-close" type="button" aria-label="关闭数据与备份">×</button>
        </div>

        <div class="data-summary" id="data-summary"></div>

        <div class="data-action-list">
          <button class="data-action" id="export-json-button" type="button">
            <span>
              <strong>导出完整备份</strong>
              <small>JSON，可用于以后恢复全部数据</small>
            </span>
            <span aria-hidden="true">JSON</span>
          </button>

          <button class="data-action" id="export-csv-button" type="button">
            <span>
              <strong>导出表格</strong>
              <small>CSV，可用 Excel 或表格软件打开</small>
            </span>
            <span aria-hidden="true">CSV</span>
          </button>

          <button class="data-action" id="choose-backup-button" type="button">
            <span>
              <strong>选择备份文件</strong>
              <small>检查 JSON 后再决定是否合并</small>
            </span>
            <span aria-hidden="true">导入</span>
          </button>
          <input id="backup-file-input" type="file" accept="application/json,.json" hidden />
        </div>

        <section class="import-preview" id="import-preview" hidden>
          <h3>备份检查结果</h3>
          <p id="import-preview-text"></p>
          <p class="import-note">合并不会覆盖当前已有的数据。</p>
          <button class="primary-button import-confirm-button" id="confirm-import-button" type="button">确认合并备份</button>
        </section>

        <p class="dialog-status data-status" id="data-status" role="status" aria-live="polite"></p>
      </section>
    </dialog>
  </body>
</html>
